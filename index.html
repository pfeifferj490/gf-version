<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", intial-scale="1.0">
    <title>Radiation Therapy Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="topNavbar" class="navbar">
        <div class="titleText">Anxiety Test</div>
    </div>
    <div id="toggleButton" class="menu-icon">
        <div class="icon-container">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span id="menuText">MENU</span>
    </div>
    <div id="ltSidebar" class="sidebar">
            <button class="nav-link" data-target="home-screen">Home</button>
            <button class="nav-link" data-target="quiz-screen">Short Quiz</button>
            <button class="nav-link" data-target="results-screen">Results</button>
            <button class="nav-link" data-target="fullquiz-screen">Full Quiz</button>
            <button class="nav-link" data-target="test-screen">Test</button>
        </nav>
    </div>
  <!--Home PAGE-->
    <div id ='home-screen' class="page">Welcome Home</div>
  <!--Quiz PAGE-->
    <div id="quiz-screen" class="page" style="display:none">
        <h1>Answer these Questions</h1>
        <div class="progress-container">
            <div id="progress-bar-fill"></div>
        </div>
        <div id="quiz-container">
        <div class="quiz-step" id="step1">
            <h3>Question 1: Which of these best describes you?</h3>
                <label class="option">
                    <input type="radio" name="q1" value="smart" data-points="0"> Smart
                </label>
                <label class="option">
                    <input type="radio" name="q1" value="lazy" data-points="2"> Lazy
                </label>
                <label class="option">
                    <input type="radio" name="q1" value="creative" data-points="8"> Creative
                </label>
                <button type="button" class="quiz-next-btn" data-step="1">Submit Answer</button>
        </div>
        <div class="quiz-step" id="step2" style="display:none;">
            <h3>Question 2: How often do you think about death?</h3>
                <label class="option">
                    <input type="radio" name="q2" data-points="10"> Daily
                </label>
                <label class="option">
                    <input type="radio" name="q2" data-points="3"> Sometimes
                </label>
                <label class="option">
                    <input type="radio" name="q2" data-points="6"> Almost never
                </label>
                <button type="button" class="quiz-next-btn" data-step="2">Submit Answer</button>
        </div>

        <div id="results-area" style="display: none;">
            <h2 id="results-title"></h2>
            <p id="results-text"></p>
            <button type="button" id="restart-btn">Restart Quiz</button>
        </div>
        </div>
    </div>
    <!--Restults PAGE-->
    <div id="results-screen" class="page" style="display:none">The Results</div>
    <!--Full quiz PAGE-->
    <div id ='fullquiz-screen' class="page" style="display:none">Full Quiz
        <div id="fullquiz-container">
            <div class="fullprogress-container">
                <div id="fullprogress-bar-fill"></div>
            </div> 
            <div id="question-screen">
                <h2 id="display-question">Question text will load here....</h2>
                <div id="display-options" class="options-grid">
                    </div>
                <div id="quiz-navigation">
                    <button id="back-btn" onclick="moveToBack()" style="display:none;">Back</button>
                </div>
            </div>
            <div id="fullresults-area" style="display: none;">
                <h2 id="fullresults-title"></h2>
                <p id="fullresults-text"></p>
                <button id="fullrestart-btn" onclick="restartQuiz()">Restart Quiz</button>
            </div>
        </div>
    </div>
    <!--Test Page-->
    <div id='test-screen' class="page" style="display:none">
        <div id='test-container'>
            <div class="test-progress-container">
                <div id="test-progress-fill"></div>
            </div>
            <div id="test-question-screen">
                <div id="test-question-text">Question loads here...</div>
                <div id="test-options" class="test-options-grid"></div>
                <div id="feedback"></div>
                <button id="action-btn" onclick="submitAnswer()">Submit</button>
            </div>
        </div>
        <div id="test-results-area" style="display: none">
                <div id="test-results-title"></div>
                <div id="test-results-text"></div>
        </div>
        <div id="summary-area" style="display: none"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
